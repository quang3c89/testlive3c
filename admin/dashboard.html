<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live3C Admin — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/animations.css">
<style>
:root {
  --bg: #f5f4f0;
  --bg-card: #ffffff;
  --bg-muted: #f0efe9;
  --accent: #5b5bd6;
  --accent-soft: rgba(91,91,214,0.08);
  --accent-border: rgba(91,91,214,0.25);
  --text-primary: #1a1a2e;
  --text-secondary: #6b6b80;
  --text-muted: #a0a0b0;
  --border: rgba(0,0,0,0.07);
  --border-hover: rgba(0,0,0,0.13);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-badge: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.admin-nav {
  background: rgba(245,244,240,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  height: 60px;
  padding: 0 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.admin-logo { text-decoration: none; font-weight: 700; font-size: 16px; color: var(--text-primary); }
.admin-links { display: flex; align-items: center; gap: 12px; }
.admin-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 7px 12px;
}
.admin-link:hover,
.admin-link.active { color: var(--text-primary); border-color: var(--border-hover); background: var(--bg-card); }
.admin-spacer { flex: 1; }

.admin-main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px;
  display: grid;
  gap: 24px;
}

.page-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.page-title { font-size: 22px; font-weight: 700; }

.create-btn {
  background: var(--accent);
  color: white;
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.card-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.card-value { font-size: 30px; font-weight: 700; color: var(--accent); line-height: 1; }

.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.table-head {
  padding: 14px 16px;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
}

table { width: 100%; border-collapse: collapse; background: var(--bg-card); }
th, td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; text-align: left; }
th {
  background: var(--bg-muted);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .05em;
}
tr:hover td { background: var(--bg-muted); transition: .15s; }
tr:last-child td { border-bottom: none; }

td:nth-child(1) { font-weight: 500; color: var(--text-primary); }
td:nth-child(2) { color: var(--text-secondary); }

.status-badge { display: inline-flex; align-items: center; border-radius: var(--radius-badge); padding: 4px 12px; font-size: 12px; font-weight: 500; }
.status-ongoing { background: #e8f5e9; color: #2e7d32; }
.status-registration { background: #fff8e1; color: #f57f17; }
.status-finished { background: var(--bg-muted); color: var(--text-muted); }

.action-links { display: inline-flex; gap: 8px; }
.action-links a { text-decoration: none; font-size: 13px; color: var(--accent); }

@media (max-width: 920px) {
  .admin-main { padding: 16px; }
  .page-head { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <nav class="admin-nav">
    <a class="admin-logo" href="dashboard.html">Live3C Admin</a>
    <div class="admin-links">
      <a class="admin-link active" href="dashboard.html">Dashboard</a>
      <a class="admin-link" href="create-tournament.html">Tạo giải mới</a>
      <a class="admin-link" href="#" id="logout-link">Đăng xuất</a>
    </div>
    <div class="admin-spacer"></div>
  </nav>

  <main class="admin-main">
    <section class="page-head">
      <h1 class="page-title">Dashboard</h1>
      <a href="create-tournament.html" class="create-btn">+ Tạo giải mới</a>
    </section>

    <section class="cards">
      <article class="card">
        <div class="card-value" id="stat-total">0</div>
        <div class="card-label">Tổng giải</div>
      </article>
      <article class="card">
        <div class="card-value" id="stat-ongoing">0</div>
        <div class="card-label">Đang diễn ra</div>
      </article>
      <article class="card">
        <div class="card-value" id="stat-finished">0</div>
        <div class="card-label">Đã kết thúc</div>
      </article>
    </section>

    <section class="table-wrap">
      <div class="table-head">Danh sách giải đấu gần đây</div>
      <table>
        <thead>
          <tr>
            <th>Tên</th>
            <th>Ngày</th>
            <th>Status</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="recent-table">
          <tr><td colspan="4" style="color:var(--muted)">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

<script type="module">
import { requireAdmin, logout } from '../assets/js/auth.js';
import { getTournaments } from '../assets/js/supabase.js';

requireAdmin();

function sampleTournaments() {
  return [
    { id:'s1', name:'3-Cushion Masters 2025', date_str:'Thứ 7, 14:00 — 19/07/2025', status:'ongoing' },
    { id:'s2', name:'Hà Nội Open Cup #3', date_str:'Chủ nhật, 09:00 — 27/07/2025', status:'registration' },
    { id:'s3', name:'Mùa Hè Billiards 2025', date_str:'15/06/2025', status:'finished' },
  ];
}

function statusLabel(status) {
  if (status === 'ongoing') return 'Đang diễn ra';
  if (status === 'registration') return 'Mở đăng ký';
  return 'Đã kết thúc';
}

function statusClass(status) {
  if (status === 'ongoing') return 'status-ongoing';
  if (status === 'registration') return 'status-registration';
  return 'status-finished';
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-ongoing').textContent = data.filter(t => t.status === 'ongoing').length;
  document.getElementById('stat-finished').textContent = data.filter(t => t.status === 'finished').length;
}

function renderTable(data) {
  const table = document.getElementById('recent-table');
  if (!data.length) {
    table.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">Chưa có giải đấu nào.</td></tr>';
    return;
  }

  table.innerHTML = data.slice(0, 10).map((t) => {
    const id = encodeURIComponent(t.id);
    return `
      <tr>
        <td>${t.name || '—'}</td>
        <td>${t.date_str || '—'}</td>
        <td><span class="status-badge ${statusClass(t.status)}">${statusLabel(t.status)}</span></td>
        <td>
          <span class="action-links">
            <a class="btn btn-sec" target="_blank" rel="noopener" href="../tournament.html?id=${id}">Xem</a>
            <a class="btn btn-ghost" href="edit-tournament.html?id=${id}">Sửa</a>
          </span>
        </td>
      </tr>`;
  }).join('');
}

async function init() {
  document.getElementById('logout-link').addEventListener('click', (e) => {
    e.preventDefault();
    logout();
  });

  try {
    const data = await getTournaments();
    const list = Array.isArray(data) && data.length ? data : sampleTournaments();
    updateStats(list);
    renderTable(list);
  } catch {
    const list = sampleTournaments();
    updateStats(list);
    renderTable(list);
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
