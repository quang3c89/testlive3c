<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Live3C — Nền tảng quản lý giải đấu Billiards Carom 3 Băng">
<meta property="og:title" content="Live3C">
<meta property="og:image" content="/assets/og-image.jpg">
<title>Live3C — Billiards Carom 3 Băng</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/tournament-header.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.3.0/dom-to-image-more.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
  }
  #loading-screen {
    flex: 0 0 auto;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.18);
  }
  .app-shell {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .panel-left {
    flex: 0 0 22%;
    min-width: 240px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: rgba(0,0,0,0.15);
    min-height: 0;
  }
  .panel-center {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-center > #bracket-area {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .panel-right {
    display: none;
  }
  .tourney-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: color-mix(in srgb, var(--tb-bg, #0d1117) 90%, #000 10%);
    font-family: var(--tb-font);
    border-bottom: 1px solid var(--border);
    min-height: 34px;
    backdrop-filter: blur(8px);
    position: relative;
    z-index: 100;
  }
  .tb-left-actions,.tb-right-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .tb-main-info{display:none !important;}
  .tvi { display:flex; align-items:center; gap:4px; padding:0 8px; font-size:11px; white-space:nowrap; border-right:1px solid color-mix(in srgb,var(--border) 70%, transparent); color:var(--text); min-width:0; }
  .tvi:last-child{border-right:none}
  .tvi .tvi-icon { font-size: 10px; opacity: 0.7; flex-shrink: 0; }
  .tvi [contenteditable] { background:none; border:none; outline:none; color:var(--text); font:inherit; cursor:default; min-width:20px; overflow:hidden; text-overflow:ellipsis; }
  body.admin-mode .tvi [contenteditable] { cursor:text; }
  #tb-v0{font-size:13px;font-weight:800;font-family:var(--title-font)}
  .tb-sync-status { display:flex; align-items:center; gap:4px; font-size:9px; font-family:var(--font-mono); opacity:.6; padding:0 6px; }
  #theme-dots { display:none; position:absolute; right:0; top:0; gap:6px; align-items:center; padding:4px 8px; border:1px solid var(--border); border-radius:999px; background:rgba(8,12,20,.95); z-index:120; }
  .tourney-bar.theme-open #theme-dots { display:flex; }
  .t-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,.15); cursor:pointer; transition:transform .15s, box-shadow .15s; }
  .t-dot:hover { transform:scale(1.2); }
  .t-dot.active { border-color:var(--accent); transform:scale(1.2); box-shadow:0 0 0 2px var(--accent),0 0 10px var(--glow); }
  .gear-btn { width:22px; height:22px; border-radius:6px; border:1px solid var(--border); background:var(--card); font-size:10px; cursor:pointer; color:var(--text); transition:all .15s; display:flex; align-items:center; justify-content:center; }
  .gear-btn:hover { background:rgba(255,255,255,.08); border-color:var(--accent); }
  body.viewer-mode #undo-btn,body.viewer-mode #redo-btn,body.viewer-mode #theme-toggle-btn,body.viewer-mode .tb-actions,body.viewer-mode .admin-only{display:none !important}
  .center-top-info {
    position: relative;
    z-index: 8;
    width: 100%;
    box-sizing: border-box;
    border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
    border-radius: 10px;
    background: linear-gradient(160deg, color-mix(in srgb, var(--card) 90%, #fff 10%), color-mix(in srgb, var(--card) 82%, #000 18%));
    box-shadow: 0 8px 20px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.04) inset;
    margin-bottom: 8px;
    overflow: hidden;
    min-height: 45px;
  }
  .cti-title, .cti-meta {
    position:absolute;
    cursor:move;
    user-select:none;
    touch-action:none;
    white-space: nowrap;
    max-width:none;
    z-index: 4;
  }
  .cti-title { font-family: var(--title-font); font-weight: 900; font-size: 16px; letter-spacing: -0.2px; left:10px; top:8px; }
  .cti-meta { font-family: var(--font-mono); font-size: 12px; opacity: 1; right:10px; left:auto; top:10px; text-align:right; }
  .cti-title::before { content:'🏆 '; opacity:.9; }
  .cti-meta::before { content:'📍 '; opacity:.9; }
  .cti-tools { position:absolute; top:2px; right:3px; display:flex; gap:2px; opacity:0; pointer-events:none; transition:opacity .15s ease; }
  .center-top-info:hover .cti-tools { opacity:.95; pointer-events:auto; }
  .panel-center > #bracket-area { flex: 1; min-height: 0; }
  .bracket-side { display: flex; gap: 0; align-items: stretch; }
  .bracket-side.left-side { flex-direction: row; }
  .bracket-side.right-side { flex-direction: row-reverse; }
  .bracket-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; gap: 10px; flex-shrink: 0; }
  .round-col {
    display: flex; flex-direction: column;
    width: 168px; padding: 0 6px;
    position: relative;
  }
  .round-label {
    text-align: center; font-size: 9px; font-weight: 800; text-transform: uppercase;
    opacity: 1; color: var(--label-contrast, #ffffff); margin-bottom: 8px; font-family: var(--font-mono); letter-spacing: 1.5px;
    text-shadow: 0 0 10px color-mix(in srgb, var(--label-contrast, #ffffff) 28%, transparent);
    position: sticky; top: 0;
  }
  .mb {
    background-color: var(--match-bg, #1f2937);
    background-image: var(--surface-gradient, none);
    border-radius: 10px;
    border: 1.5px solid var(--match-border, var(--surface-border, rgba(240,165,0,0.22)));
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, filter 0.2s ease;
    overflow: hidden;
    box-shadow: var(--surface-shadow, 0 12px 28px rgba(0,0,0,0.45));
    position: relative;
  }
  .mb::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: var(--surface-overlay, linear-gradient(180deg, rgba(255,255,255,0.06), transparent 34%));
    opacity: 0.6;
  }
  .mb:hover {
    border-color: var(--surface-border-hover, rgba(240,165,0,0.42));
    transform: translateY(-1px) scale(1.015);
    z-index: 5;
    box-shadow: var(--surface-shadow-hover, 0 16px 34px rgba(0,0,0,0.58));
  }
  .mb.anim-enter { animation: matchEnter 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .mb-bye { min-height: 74px; }
  .mp-bye-merged { min-height: 74px; align-items: center; }
  @keyframes matchEnter {
    from { opacity:0; transform: scale(0.8) translateY(-10px); }
    to { opacity:1; transform: none; }
  }
  .mb-bye {
    border-color: var(--surface-border, rgba(240,165,0,0.22));
    box-shadow: var(--surface-shadow, 0 12px 28px rgba(0,0,0,0.45));
  }
  .mp-bye-merged {
    display:flex; align-items:center; justify-content:space-between;
    padding: 8px 10px;
    background: var(--surface-gradient, linear-gradient(155deg,#1f2937 0%, #111827 100%));
  }
  .bye-pass-badge {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 800;
    color: color-mix(in srgb, var(--primary-light, #f8d77a) 80%, #fff 20%);
    border: 1px solid color-mix(in srgb, var(--primary, #f0a500) 38%, transparent);
    border-radius: 999px;
    padding: 1px 6px;
  }
  .mp {
    display: flex; align-items: center;
    padding: 5px 8px 5px 10px; cursor: pointer;
    transition: background 0.18s ease, box-shadow 0.18s ease;
    position: relative; overflow: hidden; gap: 4px;
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0));
  }
  .mp::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1.5px; background: transparent; transition: background 0.2s; }
  .mp.p1-slot::before { background: color-mix(in srgb, var(--primary, #f0a500) 44%, transparent); }
  .mp.p2-slot::before { background: color-mix(in srgb, var(--primary, #f0a500) 44%, transparent); }
  .mp:first-child { border-bottom: 1px solid color-mix(in srgb, var(--primary-light, #f8d77a) 20%, transparent); }
  .mp:hover {
    background:
      linear-gradient(90deg,
        color-mix(in srgb, var(--primary-glow, rgba(240,165,0,0.28)) 42%, transparent) 0%,
        rgba(255,255,255,0.02) 58%,
        transparent 100%);
  }
  .mp.winner {
    font-weight: 800;
    background:
      linear-gradient(108deg,
        color-mix(in srgb, var(--primary-light, #f8d77a) 52%, transparent) 0%,
        color-mix(in srgb, var(--primary, #f0a500) 42%, transparent) 48%,
        color-mix(in srgb, var(--primary-dark, #111827) 70%, transparent) 100%);
    box-shadow:
      0 0 16px color-mix(in srgb, var(--primary-glow, rgba(240,165,0,0.28)) 85%, transparent),
      0 0 0 1px color-mix(in srgb, var(--primary-light, #f8d77a) 28%, transparent) inset;
  }
  .mp.winner::before { background: var(--primary) !important; }
  .mp.winner .mn { color: color-mix(in srgb, var(--primary-light, #f8d77a) 84%, #fff 16%); }
  .mp.winner::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(90deg, color-mix(in srgb, var(--primary-glow, rgba(240,165,0,0.28)) 65%, transparent), transparent 70%);
  }
  .mp.pending-slot {
    border-color: rgba(232,184,32,0.7) !important;
    box-shadow: 0 0 0 1px rgba(232,184,32,0.45) inset, 0 0 16px rgba(232,184,32,0.35);
    animation: pendingSlotGlow 1s ease-in-out infinite;
  }
  @keyframes pendingSlotGlow {
    0%,100% { box-shadow: 0 0 0 1px rgba(232,184,32,0.35) inset, 0 0 8px rgba(232,184,32,0.2); }
    50% { box-shadow: 0 0 0 1px rgba(232,184,32,0.7) inset, 0 0 24px rgba(232,184,32,0.55); }
  }
  body.viewer-mode .mp { cursor: default; }
  body.viewer-mode .ms { pointer-events: none; opacity: 0.6; }
  .mp-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .mp-top { display: flex; align-items: center; gap: 4px; }
  .mn { font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; font-weight: 800; flex: 1; color: var(--bracket-name-color, #1f2937); opacity: 1; }
  .mp-rank { font-size: 8px; background: var(--rank-color); color: #111827; padding: 0 3px; border-radius: 2px; font-weight: 800; white-space: nowrap; font-family: var(--font-mono); flex-shrink: 0; opacity: 1; }
  .mp-unit { font-size: 8.5px; color: var(--bracket-unit-color, #5b4a16); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; line-height: 1.2; opacity: 1; }
  .ms {
    width: 28px; border: 1px solid var(--border); border-radius: 4px;
    background: rgba(255,255,255,0.05); color: inherit; padding: 1px;
    text-align: center; font-weight: 800; font-family: var(--font-mono);
    font-size: 11px; outline: none; color: var(--accent); transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .ms:focus { border-color: var(--accent); background: rgba(240,165,0,0.1); }
  .finals-match { min-width: 190px; }
  .finals-match .mp { padding: 10px 12px 10px 14px; }
  .finals-match .mn { font-size: 14px; font-weight: 800; font-family: var(--font-display); letter-spacing: 0.5px; }
  .finals-match.has-winner { box-shadow: 0 0 30px rgba(240,165,0,0.3), 0 0 60px rgba(240,165,0,0.1); border-color: rgba(240,165,0,0.5); }
  .champion-label {
    font-family: var(--font-display); font-size: 10px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; opacity: 0.72; text-align: center; padding: 4px;
    color: var(--label-contrast, #ffffff);
  }
  @keyframes slotWin {
    0%   { box-shadow: 0 0 0 0 rgba(240,165,0,0); background: rgba(240,165,0,0.08); }
    30%  { box-shadow: 0 0 0 6px rgba(240,165,0,0.35); background: rgba(240,165,0,0.18); }
    100% { box-shadow: 0 0 0 0 rgba(240,165,0,0); background: rgba(240,165,0,0.08); }
  }
  .mp.winner-flash { animation: slotWin 0.55s ease forwards; }
  @keyframes slotLose {
    from { opacity:1; }
    to   { opacity:0.35; filter: grayscale(60%); }
  }
  .mp.loser-dim { animation: slotLose 0.4s ease forwards; opacity:0.35; filter: grayscale(60%); }
  .mb.has-winner {
    border-color: rgba(240,165,0,0.5) !important;
    box-shadow: 0 0 20px rgba(240,165,0,0.15) !important;
  }
  .champ-reveal {
    animation: champIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes champIn {
    from { opacity:0; transform: scale(0.7); }
    to   { opacity:1; transform: scale(1); }
  }
  @media (max-width: 768px) {
    .panel-left {
      flex-basis: 100%;
      max-width: none;
      min-width: 0;
    }
  }
</style>
</head>
<body>
<div id="loading-screen">...</div>
<div class="tourney-bar" id="tourney-bar">
  <div class="tb-left-actions">
    <button class="gear-btn" type="button" title="Trang chủ" onclick="window.location.href='index.html'">🏠</button>
    <button class="gear-btn" id="undo-btn" onclick="undo()" title="Hoàn tác (Ctrl+Z)" disabled>↩</button>

    <div class="tvi"><span class="tvi-icon">🕒</span><div contenteditable="false" id="tb-v1" spellcheck="false"></div></div>
    <div class="tvi"><span class="tvi-icon">📍</span><div contenteditable="false" id="tb-v2" spellcheck="false"></div></div>

    <div class="tb-actions">
      <input type="color" id="tb-bg-color" title="Màu header">
    </div>
    <div id="theme-dots"></div>
  </div>
</div>
<div class="app-shell">
  <aside class="panel-left" id="panel-left">
    <div class="wheel-section">
      <div class="wheel-wrap-sm">
        <div class="wheel-ptr">▼</div>
        <div class="wheel-inner-sm">
          <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button id="spin-btn" class="spin-btn-sm">SPIN</button>
      </div>
      <div class="wheel-controls-row">
        <button class="cb" id="btn-add" title="Thêm cơ thủ">➕</button>
        <button class="cb" id="btn-import" title="Import Excel">📥</button>
        <button class="cb" id="btn-size" title="Cỡ bracket">🔢</button>
        <input type="file" id="import-excel" accept=".xlsx,.xls" style="display:none">
      </div>
    </div>
    <div class="player-list-section">
      <div class="pls-header">
        <span class="pls-title">Cơ thủ (<span id="player-count">0</span>)</span>
      </div>
      <div class="pls-grid" id="player-list"></div>
    </div>
  </aside>
  <section class="panel-center" id="panel-center">
    <div class="center-top-info" id="center-top-info">
      <div class="cti-title" id="cti-title">Giải Carom 3 Băng</div>
      <div class="cti-meta" id="cti-meta">TP.HCM · 2025</div>
      <div class="cti-tools">
        <select class="cti-mini-select" id="cti-font-select" title="Font" onchange="setCtiFont(this.value)"></select>
        <input class="cti-mini-color" id="cti-color-select" title="Màu chữ" type="color" onchange="setCtiColor(this.value)">
        <select class="cti-mini-select" id="cti-size-select" title="Kích thước" onchange="setCtiSize(this.value)"></select>
        <input class="cti-mini-color" id="cti-bg-select" title="Màu nền" type="color" onchange="setCtiBg(this.value)">
      </div>
    </div>
    <div id="bracket-area">
      <div class="bracket-tab-bar" id="bracket-tab-bar">
        <button class="btab active" id="btab-bracket" onclick="switchTab('bracket')">▦ Bracket</button>
        <button class="btab" id="btab-schedule" onclick="switchTab('schedule')">☰ Lịch đấu</button>
        <button class="btab" id="btab-register" onclick="switchTab('register')">👥 Đăng kí</button>
        <span style="flex:1"></span>
        <button class="bracket-full-btn" onclick="toggleFullscreen()" title="Toàn màn hình">⛶</button>
        <button class="bracket-full-btn" id="export-btn" onclick="exportBracket('png')" title="Xuất PNG">📷</button>
      </div>
      <div id="bracket-panel" class="tab-panel active">
        <div id="bracket-container" style="position:relative; width:100%; height:100%; overflow:auto;">
          <svg id="bracket-lines" style="position:absolute;top:0;left:0;pointer-events:none;z-index:4;overflow:visible;"></svg>
          <div id="bracket-columns" class="bracket-cols"></div>
        </div>
      </div>
      <div id="schedule-panel" class="tab-panel">
        <div class="schedule-header">
          <div class="schedule-title">⚔️ Lịch Thi Đấu</div>
        </div>
        <div id="schedule-columns" class="schedule-grid"></div>
      </div>
      <div id="register-panel" class="tab-panel">
        <div style="padding:8px;font-size:12px;font-weight:700;opacity:0.6;text-transform:uppercase;letter-spacing:1px;">Danh sách đăng kí</div>
        <input id="register-search" class="register-search-input" placeholder="Tìm cơ thủ, CLB..." oninput="filterRegister(this.value)">
        <div id="register-list" style="overflow-y:auto;flex:1;padding:8px;"></div>
      </div>
    </div>
  </section>
</div>

// SCRIPTS SẼ THÊM Ở PROMPT SAU

  <aside class="panel-left" id="panel-left">
    <div class="wheel-section">
      <div class="wheel-wrap-sm">
        <div class="wheel-ptr">▼</div>
        <div class="wheel-inner-sm">
          <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button id="spin-btn" class="spin-btn-sm">SPIN</button>
      </div>
      <div class="wheel-controls-row">
        <button class="cb" id="btn-add" title="Thêm cơ thủ">➕</button>
        <button class="cb" id="btn-import" title="Import Excel">📥</button>
        <button class="cb" id="btn-size" title="Cỡ bracket">🔢</button>
        <input type="file" id="import-excel" accept=".xlsx,.xls" style="display:none">
      </div>
    </div>
    <div class="player-list-section">
      <div class="pls-header">
        <span class="pls-title">Cơ thủ (<span id="player-count">0</span>)</span>
      </div>
      <div class="pls-grid" id="player-list"></div>
    </div>
  </aside>
  <section class="panel-center" id="panel-center">
    <div class="center-top-info" id="center-top-info">
      <div class="cti-title" id="cti-title">Giải Carom 3 Băng</div>
      <div class="cti-meta" id="cti-meta">TP.HCM · 2025</div>
      <div class="cti-tools">
        <select class="cti-mini-select" id="cti-font-select" title="Font" onchange="setCtiFont(this.value)"></select>
        <input class="cti-mini-color" id="cti-color-select" title="Màu chữ" type="color" onchange="setCtiColor(this.value)">
        <select class="cti-mini-select" id="cti-size-select" title="Kích thước" onchange="setCtiSize(this.value)"></select>
        <input class="cti-mini-color" id="cti-bg-select" title="Màu nền" type="color" onchange="setCtiBg(this.value)">
      </div>
    </div>
    <div id="bracket-area">
      <div class="bracket-tab-bar" id="bracket-tab-bar">
        <button class="btab active" id="btab-bracket" onclick="switchTab('bracket')">▦ Bracket</button>
        <button class="btab" id="btab-schedule" onclick="switchTab('schedule')">☰ Lịch đấu</button>
        <button class="btab" id="btab-register" onclick="switchTab('register')">👥 Đăng kí</button>
        <span style="flex:1"></span>
        <button class="bracket-full-btn" onclick="toggleFullscreen()" title="Toàn màn hình">⛶</button>
        <button class="bracket-full-btn" id="export-btn" onclick="exportBracket('png')" title="Xuất PNG">📷</button>
      </div>
      <div id="bracket-panel" class="tab-panel active">
        <div id="bracket-container" style="position:relative; width:100%; height:100%; overflow:auto;">
          <svg id="bracket-lines" style="position:absolute;top:0;left:0;pointer-events:none;z-index:4;overflow:visible;"></svg>
          <div id="bracket-columns" class="bracket-cols"></div>
        </div>
      </div>
      <div id="schedule-panel" class="tab-panel">
        <div class="schedule-header">
          <div class="schedule-title">⚔️ Lịch Thi Đấu</div>
        </div>
        <div id="schedule-columns" class="schedule-grid"></div>
      </div>
      <div id="register-panel" class="tab-panel">
        <div style="padding:8px;font-size:12px;font-weight:700;opacity:0.6;text-transform:uppercase;letter-spacing:1px;">Danh sách đăng kí</div>
        <input id="register-search" class="register-search-input" placeholder="Tìm cơ thủ, CLB..." oninput="filterRegister(this.value)">
        <div id="register-list" style="overflow-y:auto;flex:1;padding:8px;"></div>
      </div>
    </div>
  </section>
</div>

<script type="module">
// SCRIPTS SẼ THÊM Ở PROMPT SAU
</script>
</body>
</html>
