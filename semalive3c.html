<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Live3C — Nền tảng quản lý giải đấu Billiards Carom 3 Băng">
<meta property="og:title" content="Live3C">
<meta property="og:image" content="/assets/og-image.jpg">
<title>Live3C — Billiards Carom 3 Băng</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/tournament-header.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.3.0/dom-to-image-more.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
  }
  #loading-screen {
    flex: 0 0 auto;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.18);
  }
  .app-shell {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .panel-left {
    flex: 0 0 22%;
    min-width: 240px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: rgba(0,0,0,0.15);
    min-height: 0;
  }
  .panel-center {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-center > #bracket-area {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .panel-right {
    display: none;
  }
  .tourney-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: color-mix(in srgb, var(--tb-bg, #0d1117) 90%, #000 10%);
    font-family: var(--tb-font);
    border-bottom: 1px solid var(--border);
    min-height: 34px;
    backdrop-filter: blur(8px);
    position: relative;
    z-index: 100;
  }
  .tb-left-actions,.tb-right-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .tb-main-info{display:none !important;}
  .tvi { display:flex; align-items:center; gap:4px; padding:0 8px; font-size:11px; white-space:nowrap; border-right:1px solid color-mix(in srgb,var(--border) 70%, transparent); color:var(--text); min-width:0; }
  .tvi:last-child{border-right:none}
  .tvi .tvi-icon { font-size: 10px; opacity: 0.7; flex-shrink: 0; }
  .tvi [contenteditable] { background:none; border:none; outline:none; color:var(--text); font:inherit; cursor:default; min-width:20px; overflow:hidden; text-overflow:ellipsis; }
  body.admin-mode .tvi [contenteditable] { cursor:text; }
  #tb-v0{font-size:13px;font-weight:800;font-family:var(--title-font)}
  .tb-sync-status { display:flex; align-items:center; gap:4px; font-size:9px; font-family:var(--font-mono); opacity:.6; padding:0 6px; }
  #theme-dots { display:none; position:absolute; right:0; top:0; gap:6px; align-items:center; padding:4px 8px; border:1px solid var(--border); border-radius:999px; background:rgba(8,12,20,.95); z-index:120; }
  .tourney-bar.theme-open #theme-dots { display:flex; }
  .t-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,.15); cursor:pointer; transition:transform .15s, box-shadow .15s; }
  .t-dot:hover { transform:scale(1.2); }
  .t-dot.active { border-color:var(--accent); transform:scale(1.2); box-shadow:0 0 0 2px var(--accent),0 0 10px var(--glow); }
  .gear-btn { width:22px; height:22px; border-radius:6px; border:1px solid var(--border); background:var(--card); font-size:10px; cursor:pointer; color:var(--text); transition:all .15s; display:flex; align-items:center; justify-content:center; }
  .gear-btn:hover { background:rgba(255,255,255,.08); border-color:var(--accent); }
  body.viewer-mode #undo-btn,body.viewer-mode #redo-btn,body.viewer-mode #theme-toggle-btn,body.viewer-mode .tb-actions,body.viewer-mode .admin-only{display:none !important}
  .center-top-info {
    position: relative;
    z-index: 8;
    width: 100%;
    box-sizing: border-box;
    border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
    border-radius: 10px;
    background: linear-gradient(160deg, color-mix(in srgb, var(--card) 90%, #fff 10%), color-mix(in srgb, var(--card) 82%, #000 18%));
    box-shadow: 0 8px 20px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.04) inset;
    margin-bottom: 8px;
    overflow: hidden;
    min-height: 45px;
  }
  .cti-title, .cti-meta {
    position:absolute;
    cursor:move;
    user-select:none;
    touch-action:none;
    white-space: nowrap;
    max-width:none;
    z-index: 4;
  }
  .cti-title { font-family: var(--title-font); font-weight: 900; font-size: 16px; letter-spacing: -0.2px; left:10px; top:8px; }
  .cti-meta { font-family: var(--font-mono); font-size: 12px; opacity: 1; right:10px; left:auto; top:10px; text-align:right; }
  .cti-title::before { content:'🏆 '; opacity:.9; }
  .cti-meta::before { content:'📍 '; opacity:.9; }
  .cti-tools { position:absolute; top:2px; right:3px; display:flex; gap:2px; opacity:0; pointer-events:none; transition:opacity .15s ease; }
  .center-top-info:hover .cti-tools { opacity:.95; pointer-events:auto; }
  .panel-center > #bracket-area { flex: 1; min-height: 0; }
  @media (max-width: 768px) {
    .panel-left {
      flex-basis: 100%;
      max-width: none;
      min-width: 0;
    }
  }
</style>
</head>
<body>
<div id="loading-screen">...</div>
<div class="tourney-bar" id="tourney-bar">
  <div class="tb-left-actions">
    <button class="gear-btn" type="button" title="Trang chủ" onclick="window.location.href='index.html'">🏠</button>
    <button class="gear-btn" id="undo-btn" onclick="undo()" title="Hoàn tác (Ctrl+Z)" disabled>↩</button>
    <button class="gear-btn" id="redo-btn" onclick="redo()" title="Làm lại (Ctrl+Y)" disabled>↪</button>
  </div>
  <div class="tb-main-info">
    <div class="tvi"><span class="tvi-icon">🏆</span><div contenteditable="false" id="tb-v0" spellcheck="false"></div></div>
    <div class="tvi"><span class="tvi-icon">🕒</span><div contenteditable="false" id="tb-v1" spellcheck="false"></div></div>
    <div class="tvi"><span class="tvi-icon">📍</span><div contenteditable="false" id="tb-v2" spellcheck="false"></div></div>
    <div class="tb-sync-status" id="tb-sync-status"><span id="tb-sync-time">—</span></div>
    <div style="display:none"><div id="tb-v3"></div><div id="tb-v4"></div><div id="tb-video-url-wrap"><div id="tb-v5"></div></div></div>
  </div>
  <div class="tb-right-actions admin-only">
    <button class="gear-btn" title="Settings" onclick="openModal('settings-modal')">⚙️</button>
    <button class="gear-btn" id="theme-toggle-btn" type="button" onclick="toggleThemeDots()" title="Theme">🎨</button>
    <div class="tb-actions">
      <input type="color" id="tb-bg-color" title="Màu header">
    </div>
    <div id="theme-dots"></div>
  </div>
</div>
<div class="app-shell">
  <aside class="panel-left" id="panel-left">
    <div class="wheel-section">
      <div class="wheel-wrap-sm">
        <div class="wheel-ptr">▼</div>
        <div class="wheel-inner-sm">
          <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button id="spin-btn" class="spin-btn-sm">SPIN</button>
      </div>
      <div class="wheel-controls-row">
        <button class="cb" id="btn-add" title="Thêm cơ thủ">➕</button>
        <button class="cb" id="btn-import" title="Import Excel">📥</button>
        <button class="cb" id="btn-size" title="Cỡ bracket">🔢</button>
        <input type="file" id="import-excel" accept=".xlsx,.xls" style="display:none">
      </div>
    </div>
    <div class="player-list-section">
      <div class="pls-header">
        <span class="pls-title">Cơ thủ (<span id="player-count">0</span>)</span>
      </div>
      <div class="pls-grid" id="player-list"></div>
    </div>
  </aside>
  <section class="panel-center" id="panel-center">
    <div class="center-top-info" id="center-top-info">
      <div class="cti-title" id="cti-title">Giải Carom 3 Băng</div>
      <div class="cti-meta" id="cti-meta">TP.HCM · 2025</div>
      <div class="cti-tools">
        <select class="cti-mini-select" id="cti-font-select" title="Font" onchange="setCtiFont(this.value)"></select>
        <input class="cti-mini-color" id="cti-color-select" title="Màu chữ" type="color" onchange="setCtiColor(this.value)">
        <select class="cti-mini-select" id="cti-size-select" title="Kích thước" onchange="setCtiSize(this.value)"></select>
        <input class="cti-mini-color" id="cti-bg-select" title="Màu nền" type="color" onchange="setCtiBg(this.value)">
      </div>
    </div>
    <div id="bracket-area">
      <div class="bracket-tab-bar" id="bracket-tab-bar">
        <button class="btab active" id="btab-bracket" onclick="switchTab('bracket')">▦ Bracket</button>
        <button class="btab" id="btab-schedule" onclick="switchTab('schedule')">☰ Lịch đấu</button>
        <button class="btab" id="btab-register" onclick="switchTab('register')">👥 Đăng kí</button>
        <span style="flex:1"></span>
        <button class="bracket-full-btn" onclick="toggleFullscreen()" title="Toàn màn hình">⛶</button>
        <button class="bracket-full-btn" id="export-btn" onclick="exportBracket('png')" title="Xuất PNG">📷</button>
      </div>
      <div id="bracket-panel" class="tab-panel active">
        <div id="bracket-container" style="position:relative; width:100%; height:100%; overflow:auto;">
          <svg id="bracket-lines" style="position:absolute;top:0;left:0;pointer-events:none;z-index:4;overflow:visible;"></svg>
          <div id="bracket-columns" class="bracket-cols"></div>
        </div>
      </div>
      <div id="schedule-panel" class="tab-panel">
        <div class="schedule-header">
          <div class="schedule-title">⚔️ Lịch Thi Đấu</div>
        </div>
        <div id="schedule-columns" class="schedule-grid"></div>
      </div>
      <div id="register-panel" class="tab-panel">
        <div style="padding:8px;font-size:12px;font-weight:700;opacity:0.6;text-transform:uppercase;letter-spacing:1px;">Danh sách đăng kí</div>
        <input id="register-search" class="register-search-input" placeholder="Tìm cơ thủ, CLB..." oninput="filterRegister(this.value)">
        <div id="register-list" style="overflow-y:auto;flex:1;padding:8px;"></div>
      </div>
    </div>
  </section>
</div>

<script type="module">
// SCRIPTS SẼ THÊM Ở PROMPT SAU
</script>
</body>
</html>
